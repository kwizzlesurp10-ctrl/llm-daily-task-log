name: CI

on:
  push:
    branches: [ main, automation-refinements ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production=false

      - name: Run tests
        run: npm test

      - name: Verify summary script runs
        run: node scripts/generate-monthly-summary.js || echo "Script executed (may warn if no daily-log.md present)"