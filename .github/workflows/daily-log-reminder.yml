name: Daily LLM Log Reminder

on:
  schedule:
    # Runs every day at 20:00 UTC (adjust timezone as needed)
    - cron: '0 20 * * *'
  workflow_dispatch:   # Allow manual trigger

jobs:
  create-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Daily Log Reminder Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const title = `Daily LLM Log - ${date}`;
            
            const body = `## 📅 ${date} | [Weekday] | Total LLM Time: __h __m

### 🎯 Tasks Completed
- **Task 1**:  | Model(s):  | Outcome:  | Time: 

### 💡 Key Prompts (Summarized)
- 

### 📈 Outcomes & Metrics
- Productivity multiplier: 
- Artifacts created: 
- **Estimated tokens**: ____
- **Estimated cost**: $____

### 🔍 Reflections & Learnings
**What worked exceptionally well:**
- 
**What to improve next time:**
- 
**Follow-up actions:**
- 

### 🏷️ Tags
# 

---

**Instructions:** Fill this out and close the issue when done. Or reply here and I'll format + commit it for you.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['daily-log', 'reminder']
            });
            
            console.log(`Created daily log reminder issue for ${date}`);