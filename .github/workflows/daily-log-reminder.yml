name: Daily LLM Log Reminder

on:
  schedule:
    # Runs every day at 20:00 UTC.
    # Minneapolis (CDT) users: ~3:00 PM local time. Adjust cron as preferred.
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  create-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Daily Log Reminder Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const title = `Daily LLM Log - ${date}`;
            
            // The body below is a quick template. For a better guided experience,
            // use the "Daily LLM Log" issue template from .github/ISSUE_TEMPLATE/
            const body = `## 📅 ${date} | [Weekday] | Total LLM Time: __h __m

### 🎯 Tasks Completed
- **Task 1**:  | Model(s):  | Outcome:  | Time: 

### 💡 Key Prompts (Summarized)
- 

### 📈 Outcomes & Metrics
- Productivity multiplier: 
- Artifacts created: 
- **Estimated tokens**: ____
- **Estimated cost**: $____

### 🔍 Reflections & Learnings
**What worked exceptionally well:**
- 
**What to improve next time:**
- 
**Follow-up actions:**
- 

### 🏷️ Tags
# 

---

**Instructions:** Fill this out and close the issue when done.
You can also create issues using the **Daily LLM Log** template in the Issues tab for a structured form.

> Pro tip: Tell Grok "Log today's tasks" for the easiest workflow.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['daily-log', 'reminder']
            });
            
            console.log(`Created daily log reminder issue for ${date}`);